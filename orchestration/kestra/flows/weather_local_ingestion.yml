id: weather_local_ingestion
namespace: weather.midterm

description: |
  Midterm orchestration flow for NOAA weather data.
  This flow downloads NOAA Global Hourly data in batch mode,
  loads it into local PostgreSQL, and validates that rows were inserted.

inputs:
  - id: year
    type: STRING
    defaults: "2025"
  - id: file_limit
    type: INT
    defaults: 20
  - id: row_limit
    type: INT
    defaults: 100

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"
    timezone: Europe/Zurich
    recoverMissedSchedules: ALL

tasks:
  - id: download_weather
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      YEAR: "{{ inputs.year }}"
      FILE_LIMIT: "{{ inputs.file_limit }}"
      OUTPUT_DIR: "/app/data/raw/{{ inputs.year }}"
    commands:
      - python3 /app/ingestion/download_weather_param.py

  - id: load_to_postgres
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      YEAR: "{{ inputs.year }}"
      DATA_DIR: "/app/data/raw/{{ inputs.year }}"
      ROW_LIMIT: "{{ inputs.row_limit }}"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/weather"
    commands:
      - python3 /app/ingestion/load_to_postgres_param.py

  - id: validate_row_count
    type: io.kestra.plugin.scripts.shell.Commands
    env:
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/weather"
    commands:
      - |
        python3 - <<'PY'
        import os
        from sqlalchemy import create_engine, text

        engine = create_engine(os.environ["DATABASE_URL"])

        with engine.connect() as conn:
            result = conn.execute(text("SELECT COUNT(*) FROM weather_data;"))
            count = result.scalar()

        print(f"weather_data row count: {count}")

        if count is None or count == 0:
            raise SystemExit("Validation failed: weather_data is empty")
        PY
